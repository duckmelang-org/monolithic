spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/duckmelang?useSSL=false&allowPublicKeyRetrieval=true
    username: admin
    password: ${DB_PW}

  data:
    mongodb:
      uri: mongodb://mongodb-service:27017/duckmelang
    redis:
      host: redis-service
      port: 6379

  rabbitmq:
    host: rabbitmq-service
    port: 5672
    username: guest
    password: guest

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret-key: duckmelangduckmelangduckmelangduckmelangduckmelang
  access-expiration: 3600000
  refresh-expiration: 3600000