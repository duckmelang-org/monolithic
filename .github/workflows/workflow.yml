name: 🦆 Deploy Duckmelang to EKS

on:
  push:
    branches:
      - main # main 브랜치에 push 될 때 실행

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📂Checkout Github
        uses: actions/checkout@v2

      - name: ☕️Install Kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.25.9"
        id: install

      - name: ☁️Configure AWS
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key:  ${{ secrets.AWS_SECRET }}
          aws-region: ap-northeast-2

      - name: 🎡Update Kubeconfig
        run: aws eks update-kubeconfig --name duckmelnag --region ap-northeast-2

      - name: 🔑Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: 🐳Build and push Docker Image to ECR
        env:
          REGISTRY: 435998721170.dkr.ecr.ap-northeast-2.amazonaws.com
          REPOSITORY: duckmelang
          IMAGE_TAG: latest
        run: |
          docker build \
          -t $REGISTRY/$REPOSITORY:$IMAGE_TAG \
          -f ./Dockerfile
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      - name: 🚀Eks Kubectl Apply
        run: |
          kubectl rollout restart deployment duckmelang -n duckmelang

      - name: ✅ Check Deployment Status
        run: kubectl rollout status deployment duckmelang -n duckmelang