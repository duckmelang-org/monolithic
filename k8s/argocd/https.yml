apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-erika-com-tls
  namespace: argocd
spec:
  secretName: argocd-erika-com-tls
  duration: 2160h #90day
  renewBefore: 360h #before 15day
  issuerRef:
    name: my-issuer
    kind: ClusterIssuer
  commonName: argo.handdoc.store
  dnsNames:
    - argo.handdoc.store