apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: duckmelang
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      nodeSelector:
        eks.amazonaws.com/nodegroup: duckmelang-app-nodes
      containers:
        - name: mongodb
          image: mongo
          ports:
            - containerPort: 27017

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: duckmelang
spec:
  ports:
    - port: 27017
      targetPort: 27017
  selector:
    app: mongodb