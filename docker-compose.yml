version: "3.8"
services:
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres_container
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis-cache:
    image: redis:7-alpine
    container_name: redis-container
    restart: always
    ports:
      - "16379:6379"

  mongodb:
    image: mongo:latest
    container_name: mongo_container
    restart: always
    environment:
      MONGO_INIT_DB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INIT_DB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    ports:
      - "37017:27017"
    volumes:
      - mongo_data:/data/db

# 데이터 영속성을 위한 볼륨 정의
volumes:
  postgres_data:
  mongo_data:
